<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Landing Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #1d2b64, #f8cdda, #1fa2ff, #12d8fa);
        background-size: 400% 400%;
        animation: gradient 10s ease infinite;
        overflow: hidden;
      }

      @keyframes gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        text-align: center;
        color: white;
        animation: fadeIn 2s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 60px;
        text-transform: uppercase;
        letter-spacing: 3px;
        animation: glow 2s infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow: 0 0 10px #fff;
        }
        to {
          text-shadow:
            0 0 20px #ff00ff,
            0 0 30px #00ffff;
        }
      }

      p {
        margin: 20px 0;
        font-size: 20px;
        opacity: 0.9;
      }

      button {
        padding: 15px 35px;
        border: none;
        border-radius: 30px;
        font-size: 18px;
        cursor: pointer;
        background: white;
        color: #333;
        transition: 0.4s;
        position: relative;
        overflow: hidden;
      }

      button:hover {
        background: #000;
        color: #fff;
        transform: scale(1.1);
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        animation: float 8s infinite ease-in-out;
      }

      .circle:nth-child(1) {
        width: 200px;
        height: 200px;
        top: 10%;
        left: 10%;
      }

      .circle:nth-child(2) {
        width: 150px;
        height: 150px;
        bottom: 15%;
        right: 15%;
        animation-delay: 2s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-30px);
        }
      }
    </style>
  </head>

  <body>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="container">
      <h1>Welcome Bro 🚀</h1>
      <p>Fully Animated HTML & CSS Landing Page</p>
      <button>Explore Now</button>
    </div>
  </body>
</html>
